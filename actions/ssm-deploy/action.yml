name: 'SSM Deploy'
description: 'SSH 없이 AWS SSM Run Command로 EC2에 배포'

inputs:
  instance-id:
    description: 'EC2 인스턴스 ID'
    required: true
  script:
    description: 'EC2에서 실행할 shell script'
    required: true
  region:
    description: 'AWS 리전'
    required: false
    default: 'ap-northeast-2'
  timeout:
    description: '명령 타임아웃 (초)'
    required: false
    default: '600'

runs:
  using: 'composite'
  steps:
    - name: Send command via SSM
      shell: bash
      env:
        DEPLOY_SCRIPT: ${{ inputs.script }}
      run: |
        echo 'export HOME=/root' > /tmp/ssm_deploy_script.sh
        printf '%s' "$DEPLOY_SCRIPT" >> /tmp/ssm_deploy_script.sh
        ENCODED=$(base64 -w 0 /tmp/ssm_deploy_script.sh)

        REPO_SHORT=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2 | cut -c1-30)
        SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
        COMMENT="Deploy: ${REPO_SHORT}@${SHA_SHORT}"

        echo "::group::SSM 명령 전송"
        COMMAND_ID=$(aws ssm send-command \
          --region "${{ inputs.region }}" \
          --instance-ids "${{ inputs.instance-id }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[\"echo $ENCODED | base64 -d | bash -s\"]" \
          --timeout-seconds "${{ inputs.timeout }}" \
          --comment "$COMMENT" \
          --query "Command.CommandId" \
          --output text)
        echo "Command ID: $COMMAND_ID"
        echo "::endgroup::"

        echo "::group::완료 대기 중..."
        DEADLINE=$(( $(date +%s) + ${{ inputs.timeout }} ))
        while true; do
          STATUS=$(aws ssm get-command-invocation \
            --region "${{ inputs.region }}" \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ inputs.instance-id }}" \
            --query "StatusDetails" \
            --output text 2>/dev/null || echo "Pending")
          echo "  상태: $STATUS ($(date '+%H:%M:%S'))"
          if [[ "$STATUS" != "InProgress" && "$STATUS" != "Pending" && "$STATUS" != "Delayed" ]]; then
            break
          fi
          if [ $(date +%s) -ge $DEADLINE ]; then
            echo "타임아웃 (${{ inputs.timeout }}초 초과)"
            STATUS="TimedOut"
            break
          fi
          sleep 10
        done
        echo "::endgroup::"

        echo "::group::배포 결과"
        RESULT=$(aws ssm get-command-invocation \
          --region "${{ inputs.region }}" \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ inputs.instance-id }}" \
          --output json)

        STATUS=$(echo "$RESULT" | jq -r '.StatusDetails')
        STDOUT=$(echo "$RESULT" | jq -r '.StandardOutputContent')
        STDERR=$(echo "$RESULT" | jq -r '.StandardErrorContent')

        echo "Status: $STATUS"
        echo "--- stdout ---"
        echo "$STDOUT"
        if [ -n "$STDERR" ]; then
          echo "--- stderr ---"
          echo "$STDERR"
        fi
        echo "::endgroup::"

        if [ "$STATUS" != "Success" ]; then
          echo "::error::배포 실패 (SSM status: $STATUS)"
          exit 1
        fi
