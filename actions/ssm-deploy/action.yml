name: 'SSM Deploy'
description: 'SSH 없이 AWS SSM Run Command로 EC2에 배포'

inputs:
  instance-id:
    description: 'EC2 인스턴스 ID'
    required: true
  script:
    description: 'EC2에서 실행할 shell script'
    required: true
  region:
    description: 'AWS 리전'
    required: false
    default: 'ap-northeast-2'
  timeout:
    description: '명령 타임아웃 (초)'
    required: false
    default: '600'

runs:
  using: 'composite'
  steps:
    - name: Send command via SSM
      shell: bash
      env:
        DEPLOY_SCRIPT: ${{ inputs.script }}
      run: |
        # SSM은 HOME 환경변수 없이 실행되므로 wrapper로 감싸서 전송
        WRAPPER=$(cat << 'WRAPPER_EOF'
        export HOME=/root
        WRAPPER_EOF
        )
        FULL_SCRIPT="${WRAPPER}"$'
'"${DEPLOY_SCRIPT}"

        printf '%s' "$FULL_SCRIPT" > /tmp/ssm_deploy_script.sh
        ENCODED=$(base64 -w 0 /tmp/ssm_deploy_script.sh)

        echo "::group::SSM 명령 전송"
        COMMAND_ID=$(aws ssm send-command \
          --region "${{ inputs.region }}" \
          --instance-ids "${{ inputs.instance-id }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[\"echo $ENCODED | base64 -d | bash -s\"]" \
          --timeout-seconds "${{ inputs.timeout }}" \
          --comment "Deploy from GitHub Actions - $GITHUB_REPOSITORY@$GITHUB_SHA" \
          --query "Command.CommandId" \
          --output text)
        echo "Command ID: $COMMAND_ID"
        echo "::endgroup::"

        echo "::group::완료 대기 중..."
        aws ssm wait command-executed \
          --region "${{ inputs.region }}" \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ inputs.instance-id }}" || true
        echo "::endgroup::"

        echo "::group::배포 결과"
        RESULT=$(aws ssm get-command-invocation \
          --region "${{ inputs.region }}" \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ inputs.instance-id }}" \
          --output json)

        STATUS=$(echo "$RESULT" | jq -r '.StatusDetails')
        STDOUT=$(echo "$RESULT" | jq -r '.StandardOutputContent')
        STDERR=$(echo "$RESULT" | jq -r '.StandardErrorContent')

        echo "Status: $STATUS"
        echo "--- stdout ---"
        echo "$STDOUT"
        if [ -n "$STDERR" ]; then
          echo "--- stderr ---"
          echo "$STDERR"
        fi
        echo "::endgroup::"

        if [ "$STATUS" != "Success" ]; then
          echo "::error::배포 실패 (SSM status: $STATUS)"
          exit 1
        fi
