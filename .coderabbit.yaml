language: "ko-KR"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  instructions: |
    우리 팀은 ABCPHARM 개발표준정의서를 따릅니다.

    ## 네이밍 규칙 (제10조)
    - 변수/함수: camelCase 사용
    - 클래스/타입: PascalCase 사용
    - 상수: SCREAMING_SNAKE_CASE 사용
    - 파일명: kebab-case 사용
    - 폴더명: 단수형 명사 사용

    ## TypeScript 규칙 (제11조)
    - strict 모드 필수
    - any 타입 사용 금지
    - 모든 함수는 명확한 입력/출력 타입 명시 필수

    ## 아키텍처 원칙 (제12조, 제13조)
    - 레이어 분리: Controller/UI → Application(Service) → Domain → Infrastructure
    - Domain: 비즈니스 규칙의 유일한 위치
    - Application: 유스케이스 흐름 제어
    - Controller/UI: 입출력 변환 역할만 담당
    - Controller/UI 레이어에 비즈니스 로직 작성 금지
    - Domain 레이어에서 ORM/Framework 의존 금지

    ## 금지 사항 (제8장)
    - Controller/UI 레이어에 비즈니스 로직 작성 금지
    - Domain 레이어에서 ORM/Framework 의존 금지
    - Hard Delete를 전제로 한 설계 금지
    - TODO 또는 주석으로 로직 대체 금지
    - 명확한 근거 없이 새로운 기술 도입 금지

  path_instructions:
    - path: "**/*.ts"
      instructions: |
        TypeScript 파일 리뷰 시:
        - strict 모드 준수 확인
        - any 타입 사용 여부 검사 (사용 시 거부)
        - 함수의 입력/출력 타입 명시 확인
        - 변수/함수명 camelCase 준수 확인
        - 클래스/타입명 PascalCase 준수 확인
        - 상수명 SCREAMING_SNAKE_CASE 준수 확인

    - path: "**/*.tsx"
      instructions: |
        React/TSX 파일 리뷰 시:
        - 컴포넌트명 PascalCase 준수 확인
        - 커스텀 훅은 `use` 접두사 사용 확인
        - UI 레이어에 비즈니스 로직 포함 여부 검사
        - any 타입 사용 금지
        - 명확한 Props 타입 정의 확인

    - path: "**/modules/**"
      instructions: |
        Domain 레이어 리뷰 시:
        - 비즈니스 규칙만 포함되어 있는지 확인
        - ORM/Framework 의존성 검사 (의존 시 거부)
        - 순수 비즈니스 로직만 존재해야 함
        - 외부 라이브러리 import 최소화 확인

    - path: "**/app/**"
      instructions: |
        Application 레이어 리뷰 시:
        - 유스케이스 흐름 제어 역할만 수행하는지 확인
        - 비즈니스 규칙이 Domain으로 분리되어 있는지 확인
        - 트랜잭션 경계 적절성 검토

    - path: "**/api/**"
      instructions: |
        Controller 레이어 리뷰 시:
        - 입출력 변환 역할만 수행하는지 확인
        - 비즈니스 로직 포함 여부 검사 (포함 시 거부)
        - 요청/응답 DTO 적절성 확인
